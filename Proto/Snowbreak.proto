message ReqLogin {
	string provider = 1;
	string token = 2;
	Core.ClientProfile client_profile = 3;
}

message RspLogin {
	string session_id = 1;
	Core.Player data = 2;
	bool need_rename = 3;
	uint32 area_id = 4;
	int32 time_zone = 5;
	uint32 timestamp = 6;
	int32 certification = 7;
	map<string, uint32> global_attrs = 8;
	uint32 world_channel = 9;
	map<string, string> global_str_attrs = 10;
	uint32 error_code = 98;
	repeated uint32 error_info = 99;
}

message ReqReconnect {
	uint64 pid = 1;
	string session_id = 2;
	uint32 world_channel = 3;
	string language = 4;
}

message RspReconnect {
	string session_id = 1;
	Core.Player data = 2;
	bool need_rename = 3;
	int32 time_zone = 4;
	uint32 timestamp = 5;
	uint32 world_channel = 6;
}

message ReqAccountInfo {
	string provider = 1;
	string token = 2;
}

message ReqCallGS {
	string api = 1;
	string param = 2;
	uint32 clicknum = 3;
	repeated string dependent_params = 4;
}

message ReqUseItem {
	uint64 id = 1;
	uint32 count = 2;
}

message ReqOnlineCreateRoom {
	uint32 onlineid = 1;
	uint32 lineup_index = 2;
}

message RspOnlineCreateRoom {
	uint32 onlineid = 1;
	uint32 lineup_index = 2;
	uint64 roomid = 3;
	repeated uint32 buffinfo = 4;
}

message ReqOnlineAccept {
	uint64 otherid = 1;
	uint32 onlineid = 2;
}

message ReqOnlineChatAccept {
	uint64 otherid = 1;
	uint32 onlineid = 2;
	uint64 roomid = 3;
}

message ReqOnlineRecruit {
	uint64 room_id = 1;
	uint32 online_id = 2;
}

message FriendVigor {
	uint64 pid = 1;
	bool have_vigor = 2;
	bool vigor_got = 3;
	bool return_vigor = 4;
}

message FriendVigorList {
	repeated FriendVigor list = 1;
}

message RankList {
	message ListItem {
		string member_name = 1;
		uint32 score = 2;
		string info = 3;
	}
	string rank_name = 1;
	repeated RankList.ListItem list = 2;
}

message RankInfo {
	uint32 score = 1;
	uint32 rank = 2;
	uint32 sum = 3;
	string info = 4;
}

message GlobalCounterInfo {
	string counter_name = 1;
	uint32 value = 2;
}

message NtfLog {
	string action = 1;
	string detail = 2;
}

message NtfBroadcast {
	string msg = 1;
	uint32 duration = 2;
	uint32 start_time = 3;
	uint32 end_time = 4;
	bool clean = 5;
	repeated Core.ChannelOpt channels = 6;
}

message NtfSyncPlayer {
	string sign = 1;
	map<uint32, uint32> core = 2;
	map<uint32, uint32> custom = 3;
	map<uint32, string> custom_str = 4;
	repeated Core.Item items = 5;
	repeated uint64 show_items = 6;
	repeated uint32 show_attrs = 7;
	map<string, int32> money = 8;
	repeated Core.FriendPieces pieces = 9;
	repeated uint64 badges = 10;
	repeated uint64 tags = 11;
}

message NtfSyncLineup {
	Core.Lineup lineup = 1;
	bool remove = 2;
}

message NtfCallScript {
	string api = 1;
	string arg = 2;
	NtfSyncPlayer extra_sync = 3;
}

message NtfSetAttr {
	uint32 gid = 1;
	uint32 sid = 2;
	uint32 val = 3;
}

message NtfSetStrAttr {
	uint32 gid = 1;
	uint32 sid = 2;
	string val = 3;
}

message NtfOnlineStart {
	uint64 room_id = 1;
	string room_addr = 2;
}

message NtfOnlineRoom {
	uint64 room_id = 1;
	uint32 onlineid = 2;
	repeated Core.OnlinePlayer players = 3;
	bool bmatch = 4;
	repeated uint32 buffinfo = 5;
}

message NtfOnlineInvite {
	uint64 room_id = 1;
	uint32 onlineid = 2;
	uint64 playerid = 3;
	string name = 4;
	uint64 face = 5;
	uint64 faceframe = 6;
	uint32 level = 7;
}

message NtfOnlineRecruit {
	uint64 room_id = 1;
	uint32 online_id = 2;
	Core.PlayerProfile sender_profile = 3;
}

message NtfOnlineState {
	uint64 room_id = 1;
	uint32 onlineid = 2;
	uint32 matchflag = 3;
	repeated uint64 players = 4;
	repeated uint32 stateflag = 5;
	uint64 nowtime = 6;
	uint64 levelid = 7;
}

message ReqRoomStart {
	uint64 room_id = 1;
	bool is_reday = 2;
	string error = 3;
}

message RspRoomStart {
	repeated Core.OnlinePlayer players = 1;
	repeated uint32 buffinfo = 2;
	uint32 pollingweek = 3;
}

message NtfStopRoom {
	uint64 room_id = 1;
	string reason = 2;
}

message NtfRoomOver {
	uint64 room_id = 1;
	repeated Core.OnlineEndData playerinfo = 2;
}

message ReqAntiData {
	uint32 data_type = 1;
	bytes mtpData = 2;
	int32 plat_id = 4;
}

message NtfRoomPlayerCheat {
	uint64 room_id = 1;
	uint64 playerid = 2;
}
