syntax = "proto3";

package Core;

option csharp_namespace = "MikuSB.Proto";

enum Sex {
	MALE = 0;
	FEMALE = 1;
}

enum PlayerCoreAttribute {
	LEVEL = 0;
	EXP = 1;
	VIGOR = 2;
	CHARGED = 3;
	VIGOR_TIME = 4;
}

enum MailStat {
	New = 0;
	Readed = 1;
	Geted = 2;
	Removed = 3;
}

enum GlobalMailStat {
	Default = 0;
	Banned = 1;
	Deleted = 2;
}

enum ChatType {
	SYSTEM = 0;
	WORLD = 1;
	FRIEND = 2;
	ONLINE = 3;
}

message Empty {
}

message SimpleBoolean {
	bool data = 1;
}

message SimpleUint {
	uint64 data = 1;
}

message SimpleString {
	string data = 1;
}

message IDArray {
	repeated uint64 ids = 1;
}

message StringArray {
	repeated string list = 1;
}

message PlayerProfileArray {
	repeated PlayerProfile list = 1;
}

message ChannelOpt {
	string channel = 1;
	repeated string subchannels = 2;
}

message SimpleItem {
	uint32 G = 1;
	uint32 D = 2;
	uint32 P = 3;
	uint32 L = 4;
	uint32 Count = 5;
}

message Enhance {
	uint32 level = 1;
	uint32 exp = 2;
	uint32 break = 3;
	uint32 evolue = 4;
	uint32 trust = 5;
	uint32 pro_level = 6;
	repeated uint64 spines = 11;
	repeated uint32 affixs = 12;
}

message Item {
	uint64 id = 1;
	uint64 template = 2;
	uint32 count = 3;
	uint32 flag = 4;
	uint32 userdata = 5;
	uint32 expiration = 6;
	Enhance enhance = 7;
	map<uint32, uint64> slots = 8;
}

message Lineup {
	uint32 index = 1;
	string name = 2;
	uint64 member1 = 3;
	uint64 member2 = 4;
	uint64 member3 = 5;
}

message Player {
	uint64 pid = 1;
	string account = 2;
	string provider = 3;
	string channel = 4;
	string subchannel = 5;
	string name = 11;
	string sign = 12;
	Sex sex = 13;
	uint32 level = 14;
	uint32 exp = 15;
	uint32 vigor = 16;
	map<string, int32> money = 17;
	uint32 charged = 18;
	uint32 create_time = 31;
	uint32 last_login_time = 32;
	uint32 last_vigor_time = 33;
	uint64 item_id_alloc = 41;
	repeated Item items = 42;
	repeated Lineup solutions = 43;
	map<uint32, uint32> attrs = 44;
	map<uint32, string> str_attrs = 45;
	repeated uint64 show_items = 46;
	repeated uint32 show_attrs = 47;
	map<uint64, FriendPieces> friend_pieces = 48;
	uint64 last_pieces = 49;
	map<uint64, PlayerMail> mail_box = 50;
	uint32 last_global_mail_time = 51;
	uint64 last_person_mid = 52;
	repeated uint64 badges = 53;
	map<string, PlayerOrder> order_box = 60;
	repeated uint64 tags = 96;
	uint64 serial = 97;
	uint32 ban_type = 98;
	uint32 ban_expr = 99;
}

message FriendPieces {
	uint64 index = 1;
	uint64 pid = 2;
	uint32 shape = 3;
	uint32 expr = 4;
	bool deleted = 5;
}

message PlayerMail {
	uint64 mid = 1;
	MailStat stat = 2;
	uint32 time = 3;
	uint32 expiration = 4;
}

message Mail {
	uint64 mid = 1;
	string title = 2;
	string message = 3;
	repeated SimpleItem attachments = 4;
	string sender = 5;
	uint64 pid = 6;
	uint32 time = 7;
	uint32 expiration = 8;
	uint32 life = 9;
	MailStat stat = 10;
	bool is_deleted = 99;
}

message GlobalMail {
	uint64 mid = 1;
	string sender = 2;
	string title = 3;
	string message = 4;
	repeated SimpleItem attachments = 5;
	uint32 start_time = 6;
	uint32 end_time = 7;
	uint32 life = 8;
	uint32 expiration = 9;
	uint32 min_level = 10;
	uint32 max_level = 12;
	uint32 create_begin = 13;
	uint32 create_end = 14;
	repeated ChannelOpt channels = 15;
	GlobalMailStat stat = 99;
}

message Order {
	string trade_no = 1;
	string third_trade_no = 2;
	uint64 pid = 3;
	string product_id = 4;
	uint32 product_quantity = 5;
	uint32 total_price = 6;
	uint32 paid_price = 7;
	string finish_time = 8;
	bool status = 9;
	bool refund_status = 10;
	string refund_time = 11;
	string subchannel = 12;
	string priceunit = 13;
	bool supplement_status = 14;
	string extendinfo = 15;
}

message PlayerOrder {
	string trade_no = 1;
	string subchannel = 2;
	uint32 done_time = 3;
	uint32 refund_time = 4;
	bool is_unreal = 5;
	uint32 supplement = 6;
}

message PlayerProfile {
	uint64 pid = 1;
	string account = 2;
	uint32 create_time = 3;
	string name = 4;
	string sign = 5;
	Sex sex = 6;
	uint32 level = 7;
	uint32 logout_time = 8;
	uint32 friend_count = 9;
	repeated Item show_items = 10;
	repeated uint32 show_attrs = 11;
	repeated Item badges = 12;
	repeated uint64 tags = 13;
}

message ClientProfile {
	uint32 plat_id = 1;
	string version = 2;
	string os_version = 3;
	string os_hardware = 4;
	string telecom_oper = 5;
	string network = 6;
	uint32 screen_width = 7;
	uint32 screen_height = 8;
	float density = 9;
	string cpu_profile = 10;
	uint32 ram = 11;
	string gl_render = 12;
	string gl_version = 13;
	string device_id = 14;
	string resource_version = 15;
	string language = 16;
}

message OnlinePlayer {
	uint64 pid = 1;
	string name = 2;
	uint64 face = 3;
	uint64 faceframe = 4;
	uint32 level = 5;
	Lineup lineup = 6;
	repeated Item items = 7;
	bool captain = 8;
	uint32 stateflag = 9;
	repeated uint32 girllovelevel = 10;
	map<uint32, uint32> attrs = 11;
}

message OnlineEndData {
	uint64 pid = 1;
	string infodata = 2;
	uint32 status = 3;
}

message AccountInfo {
	string account = 1;
	uint64 pid = 2;
	uint32 new_guide = 3;
	repeated uint32 error_info = 4;
}

message ChatMsg {
	ChatType type = 1;
	uint32 channel_id = 2;
	uint64 sender = 3;
	uint64 recver = 4;
	uint32 time_stamp = 5;
	uint64 emoji = 11;
	string text = 12;
	PlayerProfile profile = 21;
}

message CustomRoster {
	uint64 pid = 1;
	map<string, string> roster = 2;
}

message GlobalAttrs {
	map<string, uint32> attrs = 1;
	map<string, string> str_attrs = 2;
}
